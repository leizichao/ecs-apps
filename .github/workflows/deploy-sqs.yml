name: Deploy SQS Service

on:
  push:
    branches:
      - main

    paths:
      - 'flask-sqs-service/**'
      - '.github/workflows/deploy-sqs.yml'

  pull_request:
    branches:
      - main

    paths:
      - 'flask-sqs-service/**'
      - '.github/workflows/deploy-sqs.yml'

jobs:
  deploy-sqs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build \
            -t flask-sqs-service \
            ./flask-sqs-service

      - name: Install Snyk
        run: |
          npm install -g snyk

      - name: Authenticate Snyk
        run: |
          snyk auth ${{ secrets.SNYK_TOKEN }}

      - name: Run Snyk Container Scan
        run: |
          snyk container test flask-sqs-service:latest \
            --file=./flask-sqs-service/Dockerfile \
            --severity-threshold=high \
            --exclude-base-image-vulns

      - name: Tag Docker Image
        run: |
          docker tag flask-sqs-service:latest \
          255945442255.dkr.ecr.ap-southeast-1.amazonaws.com/flask-sqs-service:latest

      - name: Push Docker Image
        run: |
          docker push \
          255945442255.dkr.ecr.ap-southeast-1.amazonaws.com/flask-sqs-service:latest

      - name: Force ECS Redeployment
        run: |
          aws ecs update-service \
            --cluster ecs-exercise-cluster \
            --service sqs-service \
            --force-new-deployment